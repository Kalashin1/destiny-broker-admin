<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Vite + React + TS</title>
  <style>
    .login_img_section {
      background: linear-gradient(rgba(2, 2, 2, .7), rgba(0, 0, 0, .7)), url("./public/img-1.jpg") center center;
    }

    .signup_img_section {
      background: linear-gradient(rgba(2, 2, 2, .7), rgba(0, 0, 0, .7)), url("./public/img-2.jpg") center center;
    }

    .icon::after {
      content: '';
      display: block;
      position: absolute;
      border-top: 23px solid transparent;
      border-bottom: 17px solid transparent;
      border-left: 12px solid #3182ce;
      left: 100%;
      top: 0;
    }

    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&display=swap');

    .neon-buy {
      box-shadow:
        0 0 5px #0af,
        0 0 10px #0af,
        0 0 15px #0af,
        0 0 20px #0af,
        inset 0 0 10px rgba(0, 170, 255, 0.2);
      text-shadow: 0 0 5px #fff, 0 0 10px #0af;
      animation: pulse-buy 2s infinite;
    }

    .neon-sell {
      box-shadow:
        0 0 5px #f0a,
        0 0 10px #f0a,
        0 0 15px #f0a,
        0 0 20px #f0a,
        inset 0 0 10px rgba(255, 0, 170, 0.2);
      text-shadow: 0 0 5px #fff, 0 0 10px #f0a;
      animation: pulse-sell 2s infinite;
    }

    @keyframes pulse-buy {

      0%,
      100% {
        box-shadow: 0 0 5px #0af, 0 0 10px #0af, 0 0 15px #0af, 0 0 20px #0af, inset 0 0 10px rgba(0, 170, 255, 0.2);
      }

      50% {
        box-shadow: 0 0 10px #0af, 0 0 20px #0af, 0 0 30px #0af, 0 0 40px #0af, inset 0 0 15px rgba(0, 170, 255, 0.3);
      }
    }

    @keyframes pulse-sell {

      0%,
      100% {
        box-shadow: 0 0 5px #f0a, 0 0 10px #f0a, 0 0 15px #f0a, 0 0 20px #f0a, inset 0 0 10px rgba(255, 0, 170, 0.2);
      }

      50% {
        box-shadow: 0 0 10px #f0a, 0 0 20px #f0a, 0 0 30px #f0a, 0 0 40px #f0a, inset 0 0 15px rgba(255, 0, 170, 0.3);
      }
    }

    .trading-font {
      font-family: 'Orbitron', sans-serif;
    }

    .dark-gradient {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    }

    .glow-text {
      text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
    }
  </style>
  <script src="//code.jivosite.com/widget/UcOOjcZF5k" async></script>

</head>

<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/js/all.min.js"
    integrity="sha512-u3fPA7V8qQmhBPNT5quvaXVa1mnnLSXUep5PS1qo5NRzHwG19aHmNJnj1Q8hpA/nBWZtZD4r4AX6YOt5ynLN2g=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
